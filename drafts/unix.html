          <h2 id="unix的常用指令"><a href="#unix的常用指令" class="headerlink" title="unix的常用指令"></a>unix的常用指令</h2><span id="more"></span>

<figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="built_in">ls</span> 显示指定目录下的文件目录清单相当于dos下的<span class="built_in">dir</span>命令。</span><br><span class="line"><span class="built_in">pwd</span> 显示当前目录。</span><br><span class="line"><span class="built_in">mkdir</span> 在当前目录下创建目录。</span><br><span class="line"><span class="built_in">rm</span> 删除文件或目录。</span><br><span class="line"><span class="built_in">cp</span> 复制文件。</span><br><span class="line"><span class="built_in">mv</span> 移动文件。</span><br><span class="line"><span class="built_in">cd</span> 切换工作目录。</span><br><span class="line">ps 查看进程。</span><br><span class="line">ftp 传送文件。</span><br><span class="line">telnet 远程登录命令。</span><br><span class="line">ping 用来测试本机与目标主机是否联通。</span><br><span class="line"><span class="built_in">env</span> 查看当前系统中的环境变量。</span><br><span class="line">more 分屏显示指定文件的内容。</span><br><span class="line"><span class="built_in">echo</span>在终端上显示你要显示的内容，向C语言中的<span class="built_in">printf</span>函数。</span><br><span class="line"></span><br></pre></td></tr></table></figure>
